<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <link rel="icon" type="image/png" href="favicon.png">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Welcome｜黃義偉律師 Huang YiWei Attorney</title>
    <link rel="stylesheet" href="css/style.css">
    <style>
        /* Small override to ensure counter text is visible on dark background */
        .gateway-counter {
            margin-top: 60px;
            font-size: 0.9rem;
            color: rgba(255, 255, 255, 0.6);
            letter-spacing: .05em;
            opacity: 0;
            animation: fadeUp .9s var(--ease-soft) 1s forwards; /* Fades in after buttons */
        }
    </style>
</head>
<body>

<!-- Minimal Navbar for the Gateway -->
<nav class="navbar">
  <a href="index.html" class="logo"><img src="assets/logo.png" alt="黃義偉律師 (Huang YiWei Attorney)"></a>
</nav>

<!-- Elegant Hero Section -->
<header class="hero">
  <div class="hero-pattern"></div>
  <div class="hero-content">
    <p class="hero-eyebrow">WELCOME</p>
    <h1>黃義偉 律師</h1>
    <h2>Huang YiWei Attorney</h2>
    <p>Please select your preferred language / 請選擇您的語言</p>
    
    <div class="hero-buttons">
      <!-- Primary button for default language -->
      <a href="tw-index.html" class="btn-primary" onclick="clearTimeout(timer)">繁體中文</a>
      <!-- Secondary buttons for other languages -->
      <a href="en-index.html" class="btn-secondary" onclick="clearTimeout(timer)">English</a>
      <a href="jp-index.html" class="btn-secondary" onclick="clearTimeout(timer)">日本語</a>
      <a href="kr-index.html" class="btn-secondary" onclick="clearTimeout(timer)">한국어</a>
    </div>

    <!-- Visitor Counter -->
    <div class="gateway-counter">
        Visitors: <span id="counter-display">-----</span>
    </div>
  </div>

  <!-- Decorative Wave -->
  <svg class="hero-wave" viewBox="0 0 1440 60" preserveAspectRatio="none" aria-hidden="true">
    <path d="M0,32 C240,60 480,4 720,24 C960,44 1200,8 1440,30 L1440,60 L0,60 Z"></path>
  </svg>
</header>

<!-- Redirect Script -->
<script>
    // 5-second automatic redirect to Traditional Chinese
    const timer = setTimeout(() => {
        window.location.href = 'tw-index.html';
    }, 5000);
</script>

<!-- Firebase Counter Script -->
<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
  import { getDatabase, ref, get, set, runTransaction }
    from "https://www.gstatic.com/firebasejs/10.12.0/firebase-database.js";

  const firebaseConfig = {
    apiKey: "AIzaSyCKsDPXgoCKn8OT2rMG40PeKcfjshr9Ht0",
    authDomain: "huangyiwei-counter.firebaseapp.com",
    databaseURL: "https://huangyiwei-counter-default-rtdb.asia-southeast1.firebasedatabase.app",
    projectId: "huangyiwei-counter",
    storageBucket: "huangyiwei-counter.firebasestorage.app",
    messagingSenderId: "533080665472",
    appId: "1:533080665472:web:c2411c46c467d913546565"
  };

  const app = initializeApp(firebaseConfig);
  const db = getDatabase(app);

  function getTaiwanDateStr() {
    const now = new Date();
    const taiwanTime = new Date(now.getTime() + (8 * 60 + now.getTimezoneOffset()) * 60000);
    return taiwanTime.toISOString().slice(0, 10);
  }

  const today = getTaiwanDateStr();
  const dateRef = ref(db, 'counter/date');
  const countRef = ref(db, 'counter/count');

  const snapshot = await get(dateRef);
  const storedDate = snapshot.val();

  if (storedDate !== today) {
    const newBase = Math.floor(Math.random() * 400) + 100;
    await set(ref(db, 'counter'), { date: today, count: newBase });
  }

  await runTransaction(countRef, (current) => (current || 0) + 1);

  const newSnap = await get(countRef);
  const realCount = Math.min(newSnap.val(), 999);

  const noise = Math.floor(Math.random() * 90) + 10;
  const display = String(realCount).padStart(3, '0') + String(noise);

  document.getElementById('counter-display').textContent = display;
</script>
</body>
</html>
